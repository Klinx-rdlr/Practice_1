name: CI

on:
    push:
        branches: [main]
    pull_request: 
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:17
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: testpassword
                    POSTGRES_DB: taskdb_test
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
            
        env:
            TEST_DATABASE_URL: postgresql://postgres:testpassword@localhost:5432/taskdb_test
            SECRET_KEY: test_secret_key_for_ci
            ALGORITHM: HS256
            ACCESS_TOKEN_EXPIRE_MINUTES: 30
        
        steps:
        - name: Check out code
          uses: actions/checkout@v4

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: "3.12"
        
        - name: Install Dependencies
          run: pip install -r requirements.txt
        
        - name: Run tests
          run: pytest

